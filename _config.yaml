# site properties and page defaults
title: Understanding genes, neurons, and circuits regulating circadian rhythms in behavior and physiology.
subtitle: Operated by Dr. Jeff Jones
description: TAMU Biology lab researching genes, neurons, and circuits regulating circadian rhythms in behavior and physiology.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: joneslab.tamu@gmail.com
  orcid: 0000-0002-8386-7798
  google-scholar: A71ldkkAAAAJ
  github: jones-lab-tamu
  twitter: jonesjeffr

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
